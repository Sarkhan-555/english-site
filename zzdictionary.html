<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmosda Top Vurma</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        #gameCanvas {
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }
        
        #gameInfo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
        }
        
        #startScreen {
            position: absolute;
            text-align: center;
        }
        
        button {
            background: #00ffff;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ffff;
        }
        
        button:hover {
            background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
    </style>
</head>
<body>
    <div id="gameInfo">
        Xal: <span id="score">0</span> | Qalan Can: <span id="lives">3</span>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div id="startScreen">
        <h1>Kosmosda Top Vurma</h1>
        <p>Topu vurmaq üçün siçanı istifadə edin</p>
        <button id="startButton">OYNA</button>
    </div>

    <script>
        // Oyun dəyişənləri
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;
        
        // Top parametrləri
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            speedX: 3,
            speedY: 3,
            color: '#00ffff'
        };
        
        // Ulduz fonu üçün
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speed: Math.random() * 0.5 + 0.1
            });
        }
        
        // Oyunu başlat
        startButton.addEventListener('click', startGame);
        
        function startGame() {
            score = 0;
            lives = 3;
            updateScore();
            startScreen.style.display = 'none';
            gameRunning = true;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = 3;
            ball.speedY = 3;
            animate();
        }
        
        // Animasiya döngüsü
        function animate() {
            if (!gameRunning) return;
            
            animationId = requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ulduz fonunu çək
            drawStars();
            
            // Topu hərəkət etdir və çək
            moveBall();
            drawBall();
        }
        
        // Ulduz fonunu çək
        function drawStars() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Ulduzları hərəkət etdir
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }
        
        // Topu hərəkət etdir
        function moveBall() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            
            // Divarlara dəymə yoxlaması
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.speedX = -ball.speedX;
            }
            
            if (ball.y - ball.radius < 0) {
                ball.speedY = -ball.speedY;
            }
            
            // Aşağıya dəyəndə can itir
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateScore();
                
                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }
        }
        
        // Topu çək
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
            
            // Topun içinə işıq effekti
            const gradient = ctx.createRadialGradient(
                ball.x, ball.y, 0,
                ball.x, ball.y, ball.radius
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, ball.color);
            
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Topu vurmaq üçün klik hadisəsi
        canvas.addEventListener('click', function(event) {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            
            // Topa dəyib-dəymədiyini yoxla
            const distance = Math.sqrt(
                Math.pow(mouseX - ball.x, 2) + 
                Math.pow(mouseY - ball.y, 2)
            );
            
            if (distance < ball.radius) {
                score++;
                updateScore();
                
                // Topun sürətini təsadüfi dəyiş
                ball.speedX = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 3 + 2);
                ball.speedY = -Math.abs(ball.speedY) * 1.1;
                
                // Partlama effekti
                createExplosion(ball.x, ball.y);
            }
        });
        
        // Partlama effekti
        function createExplosion(x, y) {
            ctx.fillStyle = '#ff00ff';
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 10 + 5;
                const explosionX = x + Math.cos(angle) * radius;
                const explosionY = y + Math.sin(angle) * radius;
                
                ctx.beginPath();
                ctx.arc(explosionX, explosionY, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Topu başlanğıc vəziyyətinə qaytar
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = (Math.random() > 0.5 ? 1 : -1) * 3;
            ball.speedY = -3;
        }
        
        // Xal və canları yenilə
        function updateScore() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
        }
        
        // Oyun bitdi
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            // Oyun bitdi ekranı
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Oyun Bitdi!', canvas.width / 2, canvas.height / 2 - 30);
            ctx.fillText(`Xal: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
            
            ctx.font = '20px Arial';
            ctx.fillText('Yenidən oynamaq üçün klik edin', canvas.width / 2, canvas.height / 2 + 50);
            
            // Yenidən başlatmaq üçün klik hadisəsi
            canvas.addEventListener('click', function restartGame() {
                canvas.removeEventListener('click', restartGame);
                startGame();
            }, { once: true });
        }
    </script>
</body>
</html>
